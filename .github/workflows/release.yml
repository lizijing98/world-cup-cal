name: Auto Release

on:
  push:
    branches:
      - master
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get package version
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
      
      - name: Get latest release
        id: latest_release
        run: |
          LATEST_RELEASE=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo "")
          echo "latest_release=$LATEST_RELEASE" >> $GITHUB_OUTPUT
          echo "Latest release: $LATEST_RELEASE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check if new release is needed
        id: check_release
        run: |
          CURRENT_VERSION="${{ steps.package_version.outputs.version }}"
          LATEST_RELEASE="${{ steps.latest_release.outputs.latest_release }}"
          
          if [ -z "$LATEST_RELEASE" ]; then
            echo "No existing release found, will create first release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "previous_tag=" >> $GITHUB_OUTPUT
          elif [ "$CURRENT_VERSION" != "$LATEST_RELEASE" ]; then
            echo "Version changed from $LATEST_RELEASE to $CURRENT_VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "previous_tag=$LATEST_RELEASE" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged, no release needed"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate release notes
        id: release_notes
        if: steps.check_release.outputs.should_release == 'true'
        run: |
          PREVIOUS_TAG="${{ steps.check_release.outputs.previous_tag }}"
          CURRENT_VERSION="${{ steps.package_version.outputs.version }}"
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # First release, get all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since last release, excluding github-actions commits
            COMMITS=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges | grep -v "\[skip ci\]"|| true)
            
            # Filter out commits by github-actions[bot]
            COMMITS=$(echo "$COMMITS" | grep -v "Auto-generated by GitHub Actions" || true)
          fi
          
          if [ -z "$COMMITS" ]; then
            COMMITS="Initial release"
          fi
          
          # Create release notes
          cat > release_notes.md << EOF
          ## What's Changed
          
          $COMMITS
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$CURRENT_VERSION
          EOF
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "Release notes generated:"
          cat release_notes.md
      
      - name: Create Release
        if: steps.check_release.outputs.should_release == 'true'
        run: |
          CURRENT_VERSION="${{ steps.package_version.outputs.version }}"
          RELEASE_NOTES="${{ steps.release_notes.outputs.notes }}"
          
          gh release create "$CURRENT_VERSION" \
            --title "" \
            --notes "$RELEASE_NOTES" \
            --target master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}