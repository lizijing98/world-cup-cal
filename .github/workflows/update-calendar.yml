name: Update World Cup Calendar

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'index.js'
      - 'package.json'

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check expiry date (stop after 2026-07-22)
        id: check_date
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)
          EXPIRY_DATE="2026-07-22"
          if [ "$CURRENT_DATE" \> "$EXPIRY_DATE" ]; then
            echo "已超过 2026年7月22日，停止执行定时任务"
            exit 0
          fi
          echo "当前日期 $CURRENT_DATE 在有效期内，继续执行"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Generate calendar
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          SEASON_YEAR: 2026
          CACHE_DURATION_HOURS: 24
        run: node index.js
      
      - name: Check for changes
        id: check_changes
        run: |
          git add WorldCupSchedule.ics
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "chore: update World Cup calendar [skip ci]" -m "Auto-generated by GitHub Actions"
          git push

      - name: Purge jsDelivr cache
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "正在刷新 jsDelivr 缓存..."
          curl -X POST "https://purge.jsdelivr.net/gh/lizijing98/world-cup-cal@master/WorldCupSchedule.ics"
          echo "缓存刷新请求已发送"
      
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Calendar Update Failed',
              body: `## Calendar Update Failed\n\nThe automated calendar update failed.\n\n**Error Details:**\n\`\`\`\n${process.env.ERROR_MESSAGE || 'Check the workflow logs for details'}\n\`\`\`\n\n**Workflow Run:** [View Logs](${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n**Time:** ${new Date().toISOString()}\n\nPlease check the workflow logs and fix the issue.`,
              labels: ['automated', 'bug']
            })
